<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[Dost Ka Naam] & [Tera Naam]</title>
<style>
  *{margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif;}
  body{
    background:#000;
    color:#fff;
    text-align:center;
    overflow-x:hidden;
  }
  .bg{
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:radial-gradient(circle at 50% 50%, #1a1a1a, #000);
    z-index:-1;
  }
  .dot{
    position:absolute; width:4px; height:4px; background:#FFD700; 
    border-radius:50%; animation:glow 2s infinite;
  }
  @keyframes glow{0%,100%{opacity:0.2}50%{opacity:1}}
  
  .container{padding:30px 20px; max-width:500px; margin:auto;}
  
  h1{
    font-size:32px; color:#FFD700; margin:20px 0;
    text-shadow:0 0 20px #FFD700;
  }
  .sub{font-size:16px; color:#ccc; margin-bottom:30px;}
  
  .profile{
    width:180px; height:180px; border-radius:50%;
    border:4px solid #FFD700; margin:0 auto 20px;
    box-shadow:0 0 30px #FFD700; object-fit:cover;
  }
  
  .msg{
    background:rgba(255,215,0,0.1); border:1px solid #FFD700;
    border-radius:15px; padding:20px; margin:20px 0; font-size:15px;
  }
  
  .gallery{
    display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0;
  }
  .gallery img{
    width:220%; height:500px; object-fit:cover; border-radius:10px;
    border:2px solid #333;
  }
  
  .btn{
    display:block; background:#FFD700; color:#000; text-decoration:none;
    padding:14px; margin:10px 0; border-radius:50px; font-weight:bold;
    font-size:16px; box-shadow:0 0 15px #FFD700;
  }
  .footer{margin-top:30px; font-size:12px; color:#888;}
</style>
</head>
<body>
<div class="bg"></div>

<div class="container">
  <h1>ME AND MY FREND ❤️</h1>
  <br>
  <h2>MY NAME : MOHIT</h2>
  <h3>MY FREND NAME : AKASH</h3>
  <p class="sub">KAISA LAGA BAI WHATSAAP PR BTAO FIR YE NOTE HTA DE </p>
   <h4 style="color:#FFD700; margin:20px 0;">MY AND MY FREND OF SOME MEMORISE 📸</h4>
  <div class="gallery">
    <img src="Photo1.jpg" class="profile" alt="Photo 1">
    <br>
    <img src="Photo2.jpg" class="profile" alt="Photo 2">
    <br>
    <img src="Photo3.jpg" class="profile" alt="Photo 3">
    <br>
    <img src="akash.jpg" class="profile" alt="akash">
  </div>
  <div>
  <a class="btn" href="https://instagram.com/"mohitpratap761" target="_blank">MY INSTA TAP</a>
  <a class="btn" href="https://instagram.com/kingyaduvansi2092" target="_blank">MY FREND INSTA TAP</a>
  
  <p class="footer">Made with ❤️ by [AKASH]</p>
</div>

<script>
// background dots banane ke liye
for(let i=0;i<50;i++){
  let d=document.createElement('div');
  d.className='dot';
  d.style.top=Math.random()*100+'%';
  d.style.left=Math.random()*100+'%';
  d.style.animationDelay=Math.random()*2+'s';
  document.querySelector('.bg').appendChild(d);
}
</script>
</body>
</html>
